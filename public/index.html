<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <script>
  // usernode-dev-console@1
  (function () {
    if (window.__usernodeDevConsole) return;
    window.__usernodeDevConsole = true;
    var S = '__usernodeDevConsole';
    function serialize(v, depth) {
      depth = depth || 0;
      try {
        if (v === undefined) return 'undefined';
        if (v === null) return 'null';
        if (typeof v === 'string') return v;
        if (typeof v === 'number' || typeof v === 'boolean') return String(v);
        if (typeof v === 'function') return '[Function ' + (v.name || 'anonymous') + ']';
        if (v instanceof Error) return (v.stack || (v.name + ': ' + v.message));
        if (depth > 3) return '[…]';
        var seen = new WeakSet();
        return JSON.stringify(v, function (k, val) {
          if (typeof val === 'object' && val !== null) {
            if (seen.has(val)) return '[Circular]';
            seen.add(val);
          }
          if (typeof val === 'function') return '[Function ' + (val.name || 'anonymous') + ']';
          if (val instanceof Error) return val.stack || (val.name + ': ' + val.message);
          return val;
        });
      } catch (e) { try { return String(v); } catch (_) { return '[unserializable]'; } }
    }
    function post(level, args, meta) {
      try {
        var payload = {
          sentinel: S,
          level: level,
          args: Array.prototype.slice.call(args).map(function (a) { return serialize(a); }),
          ts: Date.now(),
          url: location.href,
        };
        if (meta) for (var k in meta) payload[k] = meta[k];
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(payload, '*');
        }
      } catch (_) {}
    }
    ['log','info','warn','error','debug'].forEach(function (level) {
      var orig = console[level] ? console[level].bind(console) : function () {};
      console[level] = function () { post(level, arguments); orig.apply(null, arguments); };
    });
    window.addEventListener('error', function (e) {
      var msg = (e.error && (e.error.stack || e.error.message)) || e.message || 'Error';
      post('error', [msg], { source: e.filename || '', line: e.lineno || 0, col: e.colno || 0, kind: 'error' });
    });
    window.addEventListener('unhandledrejection', function (e) {
      var r = e.reason;
      var msg = (r && (r.stack || r.message)) || String(r);
      post('error', [msg], { kind: 'unhandledrejection' });
    });
    try { post('info', ['[dev-console ready]'], { kind: 'ready' }); } catch (_) {}
  })();
  </script>

  <title>Community Tier Lists</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%237c3aed'/><text x='50' y='68' font-size='52' text-anchor='middle'>🏆</text></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      future: { hoverOnlyWhenSupported: true },
      theme: { extend: { fontFamily: { display: ['Fraunces', 'Georgia', 'serif'], sans: ['Inter', 'system-ui', 'sans-serif'] } } },
    };
  </script>

  <link rel="stylesheet" href="https://social-vibecoding.usernodelabs.org/usernode-native/v1/native.css">
  <script src="https://social-vibecoding.usernodelabs.org/usernode-native/v1/native.js"></script>
  <script src="https://social-vibecoding.usernodelabs.org/usernode-bridge/v1/bridge.js"></script>

  <style>
    :root {
      --paper: #FAF6EE; --paper-deep: #F3EDDF; --ink: #1F2B47; --ink-soft: #5A6378;
      --line: #E7DFCC; --accent: #7c3aed;
      --un-accent: #7c3aed;
      --un-group-bg: #ffffff;
      --un-hairline: #E7DFCC;
    }
    body { background: var(--paper); color: var(--ink); font-family: Inter, system-ui, sans-serif; }
    .font-display { font-family: Fraunces, Georgia, serif; }
    .card { background: #fff; border: 1px solid var(--line); border-radius: 16px; }
    .chip {
      display: inline-flex; align-items: center; gap: 4px;
      background: #fff; border: 1px solid var(--line); border-radius: 9px;
      padding: 6px 10px; font-size: 13px; font-weight: 600; color: var(--ink);
      min-height: 34px; touch-action: none; user-select: none; -webkit-user-select: none;
      cursor: grab; max-width: 100%;
    }
    .chip img { width: 20px; height: 20px; border-radius: 4px; object-fit: cover; }
    .chip.selected { outline: 2px solid var(--accent); outline-offset: 1px; }
    .chip.dragging { opacity: 0.35; }
    .chip-ghost {
      position: fixed; z-index: 90; pointer-events: none;
      transform: translate(-50%, -60%) scale(1.06) rotate(-2deg);
      box-shadow: 0 8px 24px rgba(31,43,71,.28); cursor: grabbing;
    }
    .tier-row { display: flex; gap: 6px; align-items: stretch; }
    .tier-label {
      width: 44px; min-height: 52px; border-radius: 10px; display: grid; place-items: center;
      color: #fff; font-family: Fraunces, serif; font-weight: 900; font-size: 17px; flex: none;
      text-align: center; padding: 2px; word-break: break-word; line-height: 1.05;
    }
    .tier-items {
      flex: 1; background: var(--paper-deep); border: 1.5px dashed #cfc6ab; border-radius: 10px;
      padding: 6px; display: flex; flex-wrap: wrap; gap: 5px; align-content: flex-start; min-height: 52px;
    }
    .tier-items.drop-target { border-color: var(--accent); background: #7c3aed14; }
    .dist-bar { height: 10px; border-radius: 5px; min-width: 2px; }
    .sheet-backdrop { position: fixed; inset: 0; background: rgba(31,43,71,.45); z-index: 60; }
    .sheet-panel {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 61; background: #fff;
      max-width: 576px; margin-inline: auto;
      border-radius: 18px 18px 0 0; max-height: 82vh; overflow-y: auto;
      padding: 14px 16px calc(18px + env(safe-area-inset-bottom));
      box-shadow: 0 -10px 40px rgba(31,43,71,.25);
    }
    .btn-primary {
      background: var(--ink); color: var(--paper); font-weight: 800; border-radius: 12px;
      padding: 13px 18px; letter-spacing: .02em; width: 100%; text-align: center;
    }
    .btn-primary:disabled { opacity: .4; }
    .badge { font-size: 10px; font-weight: 800; letter-spacing: .06em; border-radius: 99px; padding: 1px 7px; }
    input, textarea, select {
      background: #fff; border: 1px solid var(--line); border-radius: 10px; padding: 9px 12px;
      font-size: 15px; color: var(--ink); width: 100%;
    }
    input:focus, textarea:focus, select:focus { outline: 2px solid var(--accent); outline-offset: 0; border-color: transparent; }
  </style>
</head>
<body>
  <div id="app"><div class="p-8 text-center" style="color:var(--ink-soft)">Loading…</div></div>
  <script src="/app.js"></script>
</body>
</html>
